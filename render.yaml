services:
  - type: web
    name: ig-backend
    runtime: node
    buildCommand: |
      apt-get update
      apt-get install -y python3 python3-pip
      python3 --version
      pip3 --version
      pip3 install yt-dlp
      python3 -m yt_dlp --version
      npm install
    startCommand: node server.js
